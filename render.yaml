services:
  # FastAPI web service — always running, serves the /api/v1/ endpoints
  - type: web
    name: price-tracker-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"

  # Cron job — runs the scraper every 12 hours, fires webhooks on price changes
  - type: cron
    name: price-scraper-cron
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 price_tracker.py
    schedule: "0 */12 * * *"
    envVars:
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
